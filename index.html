<!DOCTYPE html>

<html class="theme-dark" lang="en"> 

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>FluxyVista | Link Hub</title>
    <link rel="icon" type="image/x-icon" href="images/avatar.png">

    <meta name="description" content="FluxyVista – Indie developer building clean, fast, and smart digital experiences. Home of Voktrum.">
    <meta name="keywords" content="FluxyVista, Voktrum, indie developer, apps, software, link hub">
    <meta name="author" content="FluxyVista">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
  </head>

<body>

    <div class="container">
        <div class="column">

            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="FluxyVista Logo">

            <h1>
              <div>FluxyVista</div>
            </h1>

            <p>Indie developer building clean, fast, and smart digital experiences. 🌌</p>

            <div class="button-stack" role="navigation">

              <a class="button button-default" href="https://groups.google.com/u/1/g/voktrum-testing-group" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Google Group">1. Join Voktrum Group
              </a>

              <a class="button button-default" href="https://play.google.com/apps/testing/com.fluxyvista.voktrum" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/google-play.svg" alt="Opt In">2. Opt-In for Testing
              </a>

              <a class="button button-playstore" href="https://play.google.com/store/apps/details?id=com.fluxyvista.voktrum" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/google-play.svg" alt="Google Play">3. Download Voktrum
              </a>

              <a class="button button-patreon" href="https://www.patreon.com/cw/FluxyVista" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/patreon.svg" alt="Patreon Logo">Support on Patreon
              </a>

              <a class="button button-instagram" href="https://www.instagram.com/fluxyvista/" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram
              </a>

              <a class="button button-github" href="https://github.com/fluxyvista" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/github.svg" alt="GitHub Logo">GitHub Profile
              </a>

              <a class="button button-x" href="#" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">Follow on X
              </a>

              <a class="button button-yt" href="#" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">YouTube
              </a>

              <a class="button button-default" href="#" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-email.svg" alt="Email Icon">Contact Me
              </a>

            </div>

            <footer>
              Built by <a href="https://github.com/fluxyvista" target="_blank" rel="noopener">FluxyVista</a> | Powered by <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
            </footer>

        </div>
    </div>
